<!DOCTYPE html>
<html>
<head>
  <title>SA Flag Comparison</title>
  <style>
    body { background: #f0f0f0; font-family: sans-serif; padding: 40px; }
    .container { display: flex; gap: 60px; align-items: flex-start; }
    .flag-box { text-align: center; }
    .flag-box h2 { margin-bottom: 12px; color: #333; }
    img { border: 1px solid #ccc; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <h1>South African Flag SVG Comparison</h1>
  <div class="container">
    <div class="flag-box">
      <h2>sa_flag.svg (900×600, border-radius)</h2>
      <img src="../sa_flag.svg" width="450" height="300" alt="sa_flag.svg">
    </div>
    <div class="flag-box">
      <h2>test-flag.svg (180×120 display size)</h2>
      <img src="../test-flag.svg" width="450" height="300" alt="test-flag.svg">
    </div>
  </div>
</body>
</html>
